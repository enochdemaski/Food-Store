<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Display all available food -->

    <section class="buttons">
        <button class="menu-btn" id="menu-btnm">menu</button>
        <button class="menu-btn" id="menu-btnc">check food by name</button>
        <button class="menu-btn" id="menu-btna">add food to menu</button>
        <button class="menu-btn" id="menu-btnr">replace food by index</button>
    </section>


     <section class="first">
        <ul class="menu" id="menu">
            <h1 class="menuhead" id="menuhead"></h1>
            <p class="re" id="re"></p>
        </ul>
     </section>


    <!-- Search if food is available -->
    <section class="panel hidden" id="foodcheck">
        <h1 class="check" id="check"></h1>
        <div class="container" id="container">
            <input type="text" id="input" placeholder="Please Enter Your Food">
            <button class="btn" id="btn">submit</button>
        </div>
            <div id="cart" class="cart"></div>
    </section>

    <section class="panell hiddenn" id="replace">
        <h1 class="checkk" id="checkk"></h1>
        <div class="containerr" id="containerr">
            <div>
                <input type="text" id="index" class="input" placeholder="Please Enter Food Index Number">
            </div>
            <div>
                  <input type="text" id="nFood" class="input" placeholder="Please Enter Food To Change">
            </div>
            <button class="btnn" id="btnn">submit</button>
        </div>
            <div id="cart" class="cart"></div>
    </section>


    <!-- Addind Food -->
    <section class="panelll hiddennn" id="add">
        <h1 class="checkk" id="checkkk"></h1>
        <div class="containerrr" id="containerrr">
            <div>
                  <input type="text" id="add-input" class="inputt" placeholder="Add Food">
            </div>
            <button class="btnn" id="add-btn">submit</button>
        </div>
            <div id="cart" class="cart"></div>
    </section>
   
    <script src="main.js"></script>
</body>
</html>
